    <style>
        :root {
            --admin-bg: #0f1218;
            --admin-surface: #141a25;
            --admin-border: rgba(255, 255, 255, 0.1);
            --admin-text: #edf2f7;
            --admin-muted: #96a0b5;
            --admin-primary: #ff4700;
            --admin-accent: #ffb703;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #0f1218 url("assets/images/bg-overlay-2.jpg") center / cover no-repeat;
            color: var(--admin-text);
            font-family: Arial, sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(15, 18, 24, 0.88);
        }

        .login-shell {
            position: relative;
            width: min(440px, calc(100% - 32px));
            background: var(--admin-surface);
            border: 1px solid var(--admin-border);
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        .login-brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .login-brand img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            background: #fff;
            border-radius: 8px;
            padding: 8px;
        }

        .login-brand p,
        .login-status {
            color: var(--admin-muted);
            margin: 0;
        }

        h1 {
            font-size: 28px;
            margin: 0;
        }

        label {
            color: var(--admin-muted);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .form-control {
            min-height: 48px;
            color: #fff;
            background: #0f1218;
            border-color: var(--admin-border);
        }

        .form-control:focus {
            color: #fff;
            background: #0f1218;
            border-color: var(--admin-accent);
            box-shadow: 0 0 0 0.2rem rgba(255, 183, 3, 0.15);
        }

        .btn-login {
            min-height: 48px;
            border: 0;
            background: var(--admin-primary);
            color: #fff;
            font-weight: 800;
        }

        .login-status {
            min-height: 22px;
            font-size: 14px;
        }

        .login-status.error {
            color: #ffb4a2;
        }

        .login-status.success {
            color: #86efac;
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <div class="login-brand">
            <img src="assets/images/logo.png" alt="F Square African Food">
            <div>
                <p>F Square African Food</p>
                <h1>Admin Login</h1>
            </div>
        </div>

        <form id="admin-login-form" novalidate>
            <div class="mb-3">
                <label for="admin-username" class="form-label">Username</label>
                <input class="form-control" id="admin-username" name="username" type="text" autocomplete="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="admin-password" class="form-label">Password</label>
                <input class="form-control" id="admin-password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <p class="login-status mb-3" id="admin-login-status" aria-live="polite"></p>
            <button class="btn btn-login w-100" id="admin-login-submit" type="submit">Log In</button>
        </form>
    </main>

    <script src="assets/js/admin-login.js"></script>
</body>
